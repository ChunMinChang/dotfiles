# Firefox project-local Codex settings.
# Codex loads this file only after the project-local .codex layer is trusted.

[features]
hooks = true

[agents]
max_threads = 8
max_depth = 1

# "Latest" is concrete in Codex config. As of this Codex catalog, GPT-5.5 is
# the strongest listed model and xhigh is the maximum reasoning effort.
[profiles.rumination]
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"
web_search = "live"
include_environment_context = true
include_permissions_instructions = true
include_apps_instructions = true
project_doc_max_bytes = 262144
tool_output_token_limit = 50000

[profiles.rumination.features]
apps = true
browser_use = true
child_agents_md = true
codex_hooks = true
computer_use = true
enable_fanout = true
enable_request_compression = true
hooks = true
image_generation = true
in_app_browser = true
js_repl = true
memories = true
multi_agent = true
plugins = true
prevent_idle_sleep = true
request_permissions_tool = true
shell_snapshot = true
shell_tool = true
skill_env_var_dependency_prompt = true
skill_mcp_dependency_install = true
tool_call_mcp_elicitation = true
tool_search = true
tool_search_always_defer_mcp_tools = true
tool_suggest = true
unified_exec = true
workspace_dependencies = true

[[hooks.PostToolUse]]
matcher = "^apply_patch$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'bash "$(git rev-parse --show-toplevel)/.codex/hooks/post-apply-fixups.sh"'
timeout = 180
statusMessage = "Running Firefox lint and format checks"
